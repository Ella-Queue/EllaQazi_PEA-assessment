<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Eyes Showdown - Form Information</title>
    <link href="css/intro.css" rel="stylesheet" type="text/css">
    <link href="css/basic.css" rel="stylesheet" type="text/css">
</head>

<body>
    <header>
        <img id="leftDecor" src="images/LeftSnakeEye.png" alt="Left snake eye" height="150px">
        <h1><img src="images/SnakeEyesShowdownTitle.png" alt="Snake Eyes Showdown" height="200px"></h1>
        <img id="rightDecor" src="images/RIghtSnakeEye.png" alt="Right snake eye" height="150px">
    </header>
    <h2>User Information</h2>
    <main>
    <div id="userFormDiv">
    <form id="playerInformationForm" action="game.html" method="get">
        <label for="fName">First Name:</label>
        <input type="text" id="fName" name="fName">
        <div id="fNameError" class="errorDiv"></div>
        <br>
        <label for="lName">Last Name:</label>
        <input type="text" id="lName" name="lName">
        <div id="lNameError" class="errorDiv"></div>
        <br>
        <label for="user">Username:</label>
        <input type="text" id="user" name="user">
        <div id="userError" class="errorDiv"></div>
        <br>
        <label for="pNum">Phone Number:</label>
        <input type="text" id="pNum" name="pNum">
        <div id="pNumError" class="errorDiv"></div>
        <br>
        <label for="city">City:</label>
        <input type="text" id="city" name="city">
        <div id="cityError" class="errorDiv"></div>
        <br>
        <label for="eAddr">Email Address:</label>
        <input type="text" id="eAddr" name="eAddr">
        <div id="eAddrError" class="errorDiv"></div>
        <br>
        <label for="sMoney">Starting Money:</label>
        <input type="text" id="sMoney" name="sMoney">
        <div id="sMoneyError" class="errorDiv"></div>
        <br>
        <input type="submit" id="subBtn" value="Submit">
        <br>
    </form>
</div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
        </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/jquery.validate.min.js"
        integrity="sha512-WMEKGZ7L5LWgaPeJtw9MBM4i5w5OSBlSjTjCtSnvFJGSVD26gE5+Td12qN5pvWXhuWaWcVwF++F7aqu9cvqP0A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
        </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/additional-methods.min.js"
        integrity="sha512-TiQST7x/0aMjgVTcep29gi+q5Lk5gVTUPE9XgN0g96rwtjEjLpod4mlBRKWHeBcvGBAEvJBmfDqh2hfMMmg+5A=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/intro.js"></script>
</body>

</html>
